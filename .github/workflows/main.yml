name: Sky Watch CI Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --- BACKEND TESTING ---
  backend-tests: # <--- Fixed: Indented 2 spaces
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./backend 
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Backend Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx pytest-asyncio
          
      - name: Run Pytest
        run: PYTHONPATH=. pytest

  # --- FRONTEND TESTING ---
  frontend-tests: # <--- Fixed: Indented 2 spaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: skyapp-frontend/package-lock.json

      - name: Install Frontend Deps
        run: |
          cd skyapp-frontend
          npm ci
          
      - name: Run Vitest
        run: |
          cd skyapp-frontend
          npm test -- --run