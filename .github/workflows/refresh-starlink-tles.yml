name: Refresh Starlink TLEs

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:       # allow manual runs

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Fetch Starlink TLEs from space-track.org
        env:
          SPACETRACK_USER: ${{ secrets.SPACETRACK_USER }}
          SPACETRACK_PASS: ${{ secrets.SPACETRACK_PASS }}
        shell: python {0}
        run: |
          import httpx, json, os, sys

          username = os.environ["SPACETRACK_USER"]
          password = os.environ["SPACETRACK_PASS"]

          login_url = "https://www.space-track.org/ajaxauth/login"
          tle_url = (
              "https://www.space-track.org/basicspacedata/query/class/gp"
              "/OBJECT_NAME/STARLINK~~~/orderby/NORAD_CAT_ID/format/3tle"
          )

          with httpx.Client(follow_redirects=True) as client:
              login = client.post(login_url, data={"identity": username, "password": password}, timeout=30)
              print(f"Login status: {login.status_code}")
              print(f"Login body: {login.text[:300]}")
              login.raise_for_status()

              tle = client.get(tle_url, timeout=60)
              print(f"TLE status: {tle.status_code}")
              print(f"TLE body preview: {tle.text[:300]}")
              tle.raise_for_status()

          raw_lines = [l.strip() for l in tle.text.splitlines() if l.strip()]
          print(f"Total lines received: {len(raw_lines)}")

          sats = []
          for i in range(0, len(raw_lines), 3):
              if i + 2 < len(raw_lines):
                  name, line1, line2 = raw_lines[i], raw_lines[i+1], raw_lines[i+2]
                  if line1.startswith("1 ") and line2.startswith("2 "):
                      sats.append({
                          "OBJECT_NAME": name,
                          "OBJECT_ID": line1[2:7].strip(),
                          "TLE_LINE1": line1,
                          "TLE_LINE2": line2
                      })

          if not sats:
              print("No satellites parsed — aborting.")
              sys.exit(1)

          with open("backend/starlink_backup.json", "w") as f:
              json.dump(sats, f)

          print(f"Written {len(sats)} satellites to backend/starlink_backup.json")

      - name: Commit updated TLEs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/starlink_backup.json
          git diff --staged --quiet || git commit -m "chore: refresh Starlink TLEs"
          git push
